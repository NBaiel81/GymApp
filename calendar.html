<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Planner - Calendar</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app-container">
    <div class="header" style="justify-content:center; position:relative;">
      <a href="main.html" class="btn-icon" style="position:absolute; left:16px;">←</a>
      <h1 style="margin:0; font-size:18px">Schedule</h1>
    </div>
    
    <div class="content" style="padding-top:16px">
      <div class="card" style="padding: 16px;">
        <div class="flex-row justify-between mb-md">
          <button class="btn-icon" onclick="changeMonth(-1)">‹</button>
          <h2 style="margin:0; color:var(--text-primary)" id="month-year-display">October 2023</h2>
          <button class="btn-icon" onclick="changeMonth(1)">›</button>
        </div>
        
        <div class="calendar-grid" id="calendar-header">
          <div class="calendar-day-header">Sun</div>
          <div class="calendar-day-header">Mon</div>
          <div class="calendar-day-header">Tue</div>
          <div class="calendar-day-header">Wed</div>
          <div class="calendar-day-header">Thu</div>
          <div class="calendar-day-header">Fri</div>
          <div class="calendar-day-header">Sat</div>
        </div>
        <div class="calendar-grid" id="calendar-body">
          <!-- Generated by JS -->
        </div>
      </div>
      
      <div class="flex-row justify-between mb-sm mt-md align-center">
        <h3 id="selected-date-title" style="color:var(--text-primary); margin:0;">Selected Date</h3>
        <button class="btn btn-primary" style="width:auto; padding:6px 12px; font-size:12px" onclick="openScheduleModal()">+ Assign</button>
      </div>
      
      <div id="selected-date-content">
        <!-- Details populated by JS -->
      </div>
    </div>
  </div>

  <!-- Scheduling Modal (Bottom Sheet) -->
  <div class="modal-overlay bottom-sheet" id="schedule-modal">
    <div class="modal-content">
      <div class="flex-row justify-between mb-md">
        <h2 style="margin:0">Assign Workout</h2>
        <button class="btn-icon" style="background:var(--surface-color-light)" onclick="closeModals()">✕</button>
      </div>
      
      <div class="input-group">
        <label>Select Plan</label>
        <select class="select" id="sched-plan-select" onchange="updateSessionOptions()">
          <!-- Populated via JS -->
        </select>
      </div>

      <div class="input-group">
        <label>Select Session</label>
        <select class="select" id="sched-session-select">
          <!-- Populated via JS -->
        </select>
      </div>

      <div class="input-group">
        <label>Repeat</label>
        <select class="select" id="sched-repeat">
          <option value="none">Does not repeat</option>
          <option value="weekly">Weekly (Next 4 Weeks)</option>
        </select>
      </div>

      <button class="btn btn-primary" style="margin-top:16px" onclick="saveSchedule()">Schedule It</button>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="storage.js"></script>
  <script src="ui.js"></script>
  <script src="app.js"></script>
  <script>
    let currentDate = new Date();
    let selectedDateString = "";
    const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

    document.addEventListener('DOMContentLoaded', () => {
      UI.renderBottomNav('calendar');
      
      // Default to today
      const todayStr = getIsoDate(new Date());
      selectDate(todayStr);
      renderCalendar();
    });

    function getIsoDate(date) {
      const offset = date.getTimezoneOffset()
      date = new Date(date.getTime() - (offset*60*1000))
      return date.toISOString().split('T')[0];
    }

    function changeMonth(delta) {
      currentDate.setMonth(currentDate.getMonth() + delta);
      renderCalendar();
    }

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      document.getElementById('month-year-display').innerText = `${months[month]} ${year}`;

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const todayIso = getIsoDate(new Date());

      const data = Storage.get();
      const schedule = data.schedule || {};

      const calBody = document.getElementById('calendar-body');
      calBody.innerHTML = '';

      // Padding for first day
      for (let i = 0; i < firstDay; i++) {
        const cell = document.createElement('div');
        cell.className = 'calendar-day empty';
        calBody.appendChild(cell);
      }

      // Days of the month
      for (let i = 1; i <= daysInMonth; i++) {
        const cellDate = new Date(year, month, i);
        const isoDate = getIsoDate(cellDate);
        
        const cell = document.createElement('div');
        cell.className = 'calendar-day';
        cell.innerText = i;
        
        if(isoDate === todayIso) {
          cell.classList.add('today');
        }

        if(isoDate === selectedDateString) {
           cell.style.boxShadow = "0 0 0 2px var(--text-primary)";
        }

        if(schedule[isoDate]) {
          const status = schedule[isoDate].status;
          if(status === 'completed') cell.classList.add('done');
          else if(status === 'skipped') cell.classList.add('skipped');
          else cell.classList.add('upcoming');
        }

        cell.onclick = () => {
          selectDate(isoDate);
          renderCalendar(); // Re-render to update the selection highlight
        };

        calBody.appendChild(cell);
      }
    }

    function selectDate(isoDate) {
      selectedDateString = isoDate;
      const displayDate = new Date(isoDate);
      const offset = displayDate.getTimezoneOffset();
      displayDate.setTime(displayDate.getTime() + (offset*60*1000));
      
      document.getElementById('selected-date-title').innerText = displayDate.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
      
      const data = Storage.get();
      const sched = (data.schedule || {})[isoDate];
      const content = document.getElementById('selected-date-content');

      if(sched) {
        const plan = data.plans.find(p => p.id === sched.planId);
        const session = plan ? plan.sessions[sched.sessionIndex] : null;
        
        if(plan && session) {
          let exercisesHtml = session.exercises.map(e => {
            const exData = data.exercises.find(x => x.id === e.exerciseId);
            const wght = e.weight !== undefined ? e.weight : (exData ? exData.defaultWeight : 0);
            return `
              <div class="flex-row justify-between align-center" style="font-size:12px; color:var(--text-secondary); margin-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:4px">
                 <div style="flex:2; color:var(--text-primary)">• ${exData ? exData.name : 'Unknown'}</div>
                 <div style="flex:1; text-align:right">${e.sets} sets</div>
                 <div style="flex:1; text-align:right">${wght > 0 ? wght+'lbs' : 'Bodyweight'}</div>
              </div>`;
          }).join('');

          let statusBadge = '';
          let actionButtons = '';
          
          if(sched.status === 'completed') {
             statusBadge = '<div class="badge" style="background:var(--accent-blue); color:black">Done</div>';
             actionButtons = `<button class="btn" style="width:100%" onclick="window.location='progress.html'">View in Progress</button>`;
          }
          else if(sched.status === 'skipped') {
             statusBadge = '<div class="badge" style="background:var(--accent-red); color:white">Skipped</div>';
             actionButtons = `<button class="btn" style="width:100%" onclick="unskipDate('${isoDate}')">Restore Schedule</button>`;
          }
          else {
             statusBadge = '<div class="badge" style="background:var(--surface-color-light); border:1px solid var(--accent-green); color:var(--accent-green)">Upcoming</div>';
             actionButtons = `
                <div class="flex-row gap-sm">
                  <button class="btn btn-primary" style="flex:2" onclick="window.location='workout.html?date=${isoDate}&plan=${plan.id}&session=${sched.sessionIndex}'">Start Session</button>
                  <button class="btn" style="flex:1; background:var(--surface-color-light); color:var(--accent-red)" onclick="markSkipped('${isoDate}')">Skip</button>
                </div>
              `;
          }

          let notesHtml = '';
          if(sched.notes) {
             notesHtml = `<div style="margin-top:12px; padding:12px; background:rgba(255,255,255,0.05); border-radius:var(--radius-sm)"><strong style="font-size:12px; color:var(--accent-blue)">Notes:</strong><p style="font-size:12px; margin-top:4px">${sched.notes}</p></div>`;
          }

          content.innerHTML = `
            <div class="card" style="border-left: 4px solid var(${sched.status === 'completed' ? '--accent-blue' : sched.status === 'skipped' ? '--accent-red' : '--accent-green'})">
              <div class="flex-row justify-between mb-sm align-center">
                <div>
                  <strong style="display:block; font-size:16px; color:var(--text-primary)">${plan.title}</strong>
                  <span class="text-secondary" style="font-size:14px">${session.name}</span>
                </div>
                ${statusBadge}
              </div>
              <div class="mb-md mt-sm" style="background:var(--bg-color); padding:12px; border-radius:var(--radius-md)">
                ${exercisesHtml}
              </div>
              ${actionButtons}
              ${notesHtml}
              <button class="btn-icon" style="position:absolute; top:8px; right:8px; color:var(--text-secondary); width:24px; height:24px" onclick="removeSchedule('${isoDate}')">🗑</button>
            </div>
          `;
        } else {
          content.innerHTML = `<p class="text-secondary">Data error: Workout details missing.</p>`;
        }
      } else {
        content.innerHTML = `
          <div class="card" style="text-align:center; padding:32px 16px; border: 1px dashed var(--border-color); background: transparent">
            <div style="font-size:32px; margin-bottom:8px">🛋️</div>
            <p class="text-secondary mb-md">No workout scheduled for this day.</p>
            <button class="btn btn-primary" style="width:auto" onclick="openScheduleModal()">Assign Workout</button>
          </div>
        `;
      }
    }

    function markSkipped(isoDate) {
      const data = Storage.get();
      if(data.schedule[isoDate]) {
        data.schedule[isoDate].status = 'skipped';
        Storage.save();
        renderCalendar();
        selectDate(isoDate);
        UI.toast('Marked as skipped');
      }
    }
    
    function unskipDate(isoDate) {
      const data = Storage.get();
      if(data.schedule[isoDate]) {
        data.schedule[isoDate].status = 'upcoming';
        Storage.save();
        renderCalendar();
        selectDate(isoDate);
      }
    }

    function removeSchedule(isoDate) {
      if(confirm("Remove this scheduled session?")) {
         const data = Storage.get();
         delete data.schedule[isoDate];
         Storage.save();
         renderCalendar();
         selectDate(isoDate);
      }
    }

    function openScheduleModal() {
      const data = Storage.get();
      const planSelect = document.getElementById('sched-plan-select');
      planSelect.innerHTML = data.plans.map(p => `<option value="${p.id}">${p.title}</option>`).join('');
      
      updateSessionOptions();
      document.getElementById('schedule-modal').classList.add('active');
    }

    function updateSessionOptions() {
      const data = Storage.get();
      const planId = document.getElementById('sched-plan-select').value;
      const plan = data.plans.find(p => p.id === planId);
      const sessSelect = document.getElementById('sched-session-select');
      
      if(plan && plan.sessions.length > 0) {
        sessSelect.innerHTML = plan.sessions.map((s, idx) => `<option value="${idx}">${s.name}</option>`).join('');
      } else {
        sessSelect.innerHTML = `<option disabled>No sessions in this plan</option>`;
      }
    }

    function saveSchedule() {
      const planId = document.getElementById('sched-plan-select').value;
      const sessionIndex = parseInt(document.getElementById('sched-session-select').value);
      const repeat = document.getElementById('sched-repeat').value;

      if(!planId || isNaN(sessionIndex)) return;

      const data = Storage.get();
      if(!data.schedule) data.schedule = {};

      data.schedule[selectedDateString] = { planId, sessionIndex, status: 'upcoming' };

      if(repeat === 'weekly') {
        let d = new Date(selectedDateString);
        const offset = d.getTimezoneOffset();
        d.setTime(d.getTime() + (offset*60*1000));

        for(let i=1; i<=4; i++) {
          d.setDate(d.getDate() + 7);
          data.schedule[getIsoDate(d)] = { planId, sessionIndex, status: 'upcoming' };
        }
      }

      Storage.save();
      closeModals();
      renderCalendar();
      selectDate(selectedDateString);
      UI.toast("Workout scheduled!");
    }

    function closeModals() {
      document.querySelectorAll('.modal-overlay').forEach(el => el.classList.remove('active'));
    }
  </script>
</body>
</html>
