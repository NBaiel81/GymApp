<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Planner - Builder</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .exercise-picker-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      border-bottom: 1px solid var(--border-color);
      cursor: pointer;
    }
    .exercise-picker-item:hover {
      background: var(--surface-color-light);
    }
  </style>
</head>
<body>
  <div id="app-container">
    <div class="header">
      <button class="btn-icon" onclick="goBack()">←</button>
      <h2 style="margin:0">Plan Builder</h2>
      <button class="btn btn-primary" style="width:auto; padding:8px 16px" onclick="savePlan()">Save</button>
    </div>
    
    <div class="content" id="builder-content">
      <!-- Generated by JS -->
    </div>
  </div>

  <!-- Exercise Picker Modal (Bottom Sheet) -->
  <div class="modal-overlay bottom-sheet" id="exercise-picker-modal">
    <div class="modal-content" style="padding:0; display:flex; flex-direction:column; height:85vh;">
      <div class="header" style="padding:20px; background:var(--surface-color); border-bottom:1px solid var(--border-color); border-radius: 24px 24px 0 0; position:sticky; top:0; z-index:10;">
        <h2 style="margin:0">Add Exercise</h2>
        <button class="btn" style="width:auto; padding:6px 12px; font-size:12px; background:var(--surface-color-light)" onclick="closePicker()">Close</button>
      </div>
      
      <div style="padding:16px;">
        <input type="text" id="picker-search" class="input" placeholder="Search exercises..." onkeyup="renderPickerList()">
      </div>
      
      <div style="flex:1; overflow-y:auto; padding:0 16px 16px 16px;" id="picker-list">
        <!-- Rendered via JS -->
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="storage.js"></script>
  <script src="ui.js"></script>
  <script src="app.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const planId = urlParams.get('id'); 
    
    let currentPlan = null;
    let allExercises = [];
    let activeSessionIndex = -1;

    document.addEventListener('DOMContentLoaded', () => {
      const data = Storage.get();
      allExercises = data.exercises;
      
      if(planId) {
         // clone to avoid mutating before save
         const existing = data.plans.find(p => p.id === planId);
         if(existing) {
             currentPlan = JSON.parse(JSON.stringify(existing));
         }
      }
      
      if(!currentPlan) {
          // Fallback if not found or new
          currentPlan = {
            id: planId || 'p' + Date.now(),
            title: "New Plan",
            goal: "Strength",
            sessionsPerWeek: 3,
            difficulty: "Intermediate",
            tags: ["Custom"],
            sessions: [ { name: "Day 1", exercises: [] } ]
          };
      }

      renderBuilder();
    });
    
    function goBack() {
        if(confirm("Discard unsaved changes?")) {
            window.location = 'plans.html';
        }
    }

    function savePlan() {
      // Sync basic details
      currentPlan.title = document.getElementById('plan-title').value;
      currentPlan.goal = document.getElementById('plan-goal').value;
      
      // Update session names
      currentPlan.sessions.forEach((s, idx) => {
          const nameInput = document.getElementById(`session-name-${idx}`);
          if(nameInput) s.name = nameInput.value;
      });

      const data = Storage.get();
      const existingIdx = data.plans.findIndex(p => p.id === currentPlan.id);
      
      if(existingIdx >= 0) {
          data.plans[existingIdx] = currentPlan;
      } else {
          data.plans.unshift(currentPlan);
      }
      Storage.save();
      
      UI.toast('Plan Saved!');
      setTimeout(() => window.location = 'plans.html', 1000);
    }

    function addSession() {
        currentPlan.sessions.push({
            name: `Day ${currentPlan.sessions.length + 1}`,
            exercises: []
        });
        renderBuilder();
    }
    
    function deleteSession(idx) {
        if(confirm("Remove this session?")) {
            currentPlan.sessions.splice(idx, 1);
            renderBuilder();
        }
    }

    function removeExercise(sIdx, eIdx) {
        currentPlan.sessions[sIdx].exercises.splice(eIdx, 1);
        renderBuilder();
    }
    
    function updateExerciseProp(sIdx, eIdx, field, val) {
        currentPlan.sessions[sIdx].exercises[eIdx][field] = Number(val);
    }

    function openPicker(sIdx) {
        activeSessionIndex = sIdx;
        document.getElementById('picker-search').value = '';
        renderPickerList();
        document.getElementById('exercise-picker-modal').classList.add('active');
    }

    function closePicker() {
        document.getElementById('exercise-picker-modal').classList.remove('active');
    }

    function renderPickerList() {
        const q = document.getElementById('picker-search').value.toLowerCase();
        const list = document.getElementById('picker-list');
        list.innerHTML = '';
        
        const filtered = allExercises.filter(e => e.name.toLowerCase().includes(q) || e.primaryMuscle.toLowerCase().includes(q));
        
        filtered.forEach(ex => {
            const el = document.createElement('div');
            el.className = 'exercise-picker-item';
            
            let imgHtml = `<div style="font-size:24px; margin-right:12px; min-width:30px; text-align:center">${ex.image}</div>`;
            if (ex.image && ex.image.startsWith('data:')) {
               imgHtml = `<img src="${ex.image}" style="width:30px; height:30px; border-radius:4px; object-fit:cover; margin-right:12px">`;
            }
            
            el.innerHTML = `
              <div class="flex-row" style="flex:1">
                ${imgHtml}
                <div>
                  <strong style="color:var(--text-primary); font-size:14px">${ex.name}</strong>
                  <div style="font-size:10px; color:var(--text-secondary)">${ex.primaryMuscle}</div>
                </div>
              </div>
              <button class="btn btn-primary" style="width:auto; padding:4px 12px; font-size:12px;">Add</button>
            `;
            
            el.onclick = () => {
                let trackMode = (ex.durationSec && ex.durationSec > 0) ? 'timer' : 'reps';
                let newEx = {
                    exerciseId: ex.id,
                    trackingMode: trackMode,
                    sets: ex.defaultSets || 3
                };
                
                if(trackMode === 'reps') {
                    newEx.targetReps = ex.defaultReps || 10;
                    newEx.weight = ex.defaultWeight || 0;
                } else {
                    newEx.durationSec = ex.durationSec || 60;
                }
                
                currentPlan.sessions[activeSessionIndex].exercises.push(newEx);
                UI.toast(`Added ${ex.name}`);
                closePicker();
                renderBuilder();
            };
            
            list.appendChild(el);
        });
    }

    function renderBuilder() {
      const content = document.getElementById('builder-content');

      let html = `
        <div class="card">
          <div class="input-group">
            <label>Plan Title</label>
            <input type="text" id="plan-title" class="input" value="${currentPlan.title}">
          </div>
          <div class="input-group mb-sm">
            <label>Goal</label>
            <select id="plan-goal" class="select">
              <option ${currentPlan.goal==='Strength'?'selected':''}>Strength</option>
              <option ${currentPlan.goal==='Hypertrophy'?'selected':''}>Hypertrophy</option>
              <option ${currentPlan.goal==='Endurance'?'selected':''}>Endurance</option>
              <option ${currentPlan.goal==='Strength & Control'?'selected':''}>Strength & Control</option>
              <option ${currentPlan.goal==='Skill Acquisition'?'selected':''}>Skill Acquisition</option>
              <option ${currentPlan.goal==='Core Strength'?'selected':''}>Core Strength</option>
            </select>
          </div>
        </div>
        <h2 class="mt-md mb-md text-primary" style="padding-left:4px">Sessions</h2>
      `;

      currentPlan.sessions.forEach((session, sIdx) => {
        let exHtml = session.exercises.map((ex, eIdx) => {
           const exData = allExercises.find(e => e.id === ex.exerciseId) || {name: "Unknown", image:"❓"};
           
           let trackingControls = '';
           if(ex.trackingMode === 'reps') {
              trackingControls = `
                <div class="flex-row gap-sm mt-sm">
                   <div style="flex:1"><label style="font-size:10px; color:var(--text-secondary)">Sets</label><input type="number" class="input" style="padding:6px; font-size:14px" value="${ex.sets}" onchange="updateExerciseProp(${sIdx}, ${eIdx}, 'sets', this.value)"></div>
                   <div style="flex:1"><label style="font-size:10px; color:var(--text-secondary)">Reps</label><input type="number" class="input" style="padding:6px; font-size:14px" value="${ex.targetReps}" onchange="updateExerciseProp(${sIdx}, ${eIdx}, 'targetReps', this.value)"></div>
                   <div style="flex:1"><label style="font-size:10px; color:var(--text-secondary)">Wt (lbs)</label><input type="number" class="input" style="padding:6px; font-size:14px" value="${ex.weight !== undefined ? ex.weight : (exData.defaultWeight || 0)}" onchange="updateExerciseProp(${sIdx}, ${eIdx}, 'weight', this.value)"></div>
                </div>
              `;
           } else {
              trackingControls = `
                <div class="flex-row gap-sm mt-sm">
                   <div style="flex:1"><label style="font-size:10px; color:var(--text-secondary)">Sets</label><input type="number" class="input" style="padding:6px; font-size:14px" value="${ex.sets}" onchange="updateExerciseProp(${sIdx}, ${eIdx}, 'sets', this.value)"></div>
                   <div style="flex:2"><label style="font-size:10px; color:var(--text-secondary)">Duration (sec)</label><input type="number" class="input" style="padding:6px; font-size:14px" value="${ex.durationSec || exData.durationSec || 60}" onchange="updateExerciseProp(${sIdx}, ${eIdx}, 'durationSec', this.value)"></div>
                </div>
              `;
           }

           let imgHtml = `<span style="margin-right:8px">${exData.image}</span>`;
           if (exData.image && exData.image.startsWith('data:')) {
               imgHtml = `<img src="${exData.image}" style="width:20px; height:20px; border-radius:4px; object-fit:cover; margin-right:8px; display:inline-block; vertical-align:middle;">`;
           }

           return `
            <div style="background:var(--bg-color); padding:12px; border-radius:var(--radius-md); margin-bottom:8px; border:1px solid var(--border-color)">
              <div class="flex-row justify-between align-center">
                <strong style="display:flex; align-items:center; font-size:14px; color:var(--text-primary)">
                  ${imgHtml} ${exData.name}
                </strong>
                <button class="btn-icon" style="width:24px; height:24px; padding:0; color:var(--accent-red)" onclick="removeExercise(${sIdx}, ${eIdx})">✕</button>
              </div>
              ${trackingControls}
            </div>
           `;
        }).join('');

        html += `
          <div class="card" style="border: 1px solid var(--border-color)">
            <div class="flex-row justify-between mb-md align-center">
              <input type="text" id="session-name-${sIdx}" class="input" value="${session.name}" style="background:transparent; border:none; padding:0; font-size:16px; font-weight:bold; color:var(--text-primary); outline:none; flex:1" placeholder="Session Name">
              <button class="btn-icon text-red" style="padding:4px; margin-left:8px;" onclick="deleteSession(${sIdx})">🗑</button>
            </div>
            ${exHtml}
            <button class="btn mt-sm" style="background:rgba(255,255,255,0.05); border:1px dashed var(--border-color); color:var(--text-secondary)" onclick="openPicker(${sIdx})">+ Add Exercise</button>
          </div>
        `;
      });

      html += `<button class="btn mb-lg" style="background:var(--surface-color-light); color:var(--accent-blue)" onclick="addSession()">+ Add Another Session</button>`;
      content.innerHTML = html;
    }
  </script>
</body>
</html>
