<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Planner - Plans</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app-container">
    <div class="header" style="justify-content:center; position:relative;">
      <h1 style="margin:0; font-size:18px">Workout Plans</h1>
      <button class="btn btn-primary" style="position:absolute; right:16px; width:auto; padding:6px 12px; font-size:12px" onclick="createPlan()">+ New</button>
    </div>
    
    <div class="content" id="plans-list" style="padding-top:16px">
      <!-- Plans generated by JS -->
    </div>
  </div>

  <!-- Quick Schedule Modal -->
  <div class="modal-overlay" id="quick-schedule-modal">
    <div class="modal-content">
      <div class="flex-row justify-between mb-md">
        <h2 style="margin:0">Schedule Plan</h2>
        <button class="btn-icon" style="background:var(--surface-color-light); width:30px; height:30px; padding:0" onclick="closeModals()">✕</button>
      </div>
      
      <p class="text-secondary mb-md" id="qs-plan-title" style="font-size:14px; font-weight:bold; color:var(--text-primary)"></p>
      
      <div class="input-group">
        <label>Start Date</label>
        <input type="date" class="input" id="qs-date">
      </div>

      <div class="input-group">
        <label>Pattern</label>
        <select class="select" id="qs-pattern">
          <option value="consecutive">Consecutive Days (e.g. Mon, Tue, Wed)</option>
          <option value="alternate">Alternate Days (e.g. Mon, Wed, Fri)</option>
        </select>
      </div>
      
      <div class="input-group">
        <label>Repeat</label>
        <select class="select" id="qs-repeat">
          <option value="1">Just this week</option>
          <option value="4">Repeat for 4 weeks</option>
          <option value="8">Repeat for 8 weeks</option>
        </select>
      </div>

      <button class="btn btn-primary mt-md" onclick="applyQuickSchedule()">Add to Calendar</button>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="storage.js"></script>
  <script src="ui.js"></script>
  <script src="app.js"></script>
  <script>
    let activePlanIdForSchedule = null;

    document.addEventListener('DOMContentLoaded', () => {
      renderPlans();
      UI.renderBottomNav('plans');
      
      // set default date to today
      const d = new Date();
      const offset = d.getTimezoneOffset();
      d.setTime(d.getTime() - (offset*60*1000));
      document.getElementById('qs-date').value = d.toISOString().split('T')[0];
    });

    function renderPlans() {
      const data = Storage.get();
      const list = document.getElementById('plans-list');
      list.innerHTML = '';
      
      data.plans.forEach(plan => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="flex-row justify-between mb-sm align-center">
            <h2 style="margin:0; color:var(--text-primary)">${plan.title}</h2>
            <div class="badge">${plan.difficulty || 'Mixed'}</div>
          </div>
          <p class="mb-sm text-secondary">${plan.sessions.length} Sessions • ${plan.goal}</p>
          <div class="flex-row gap-sm mb-md" style="flex-wrap:wrap">
            ${plan.tags ? plan.tags.map(t => `<span style="font-size:10px; background:rgba(255,255,255,0.1); padding:2px 6px; border-radius:4px; color:var(--text-secondary)">${t}</span>`).join('') : ''}
          </div>
          <div class="flex-row gap-sm">
            <button class="btn btn-primary" style="flex:2" onclick="openScheduleModal('${plan.id}')">Assign to Schedule</button>
            <a href="builder.html?id=${plan.id}" class="btn-icon" style="background:var(--surface-color-light); width:40px; height:40px" title="Edit">✏️</a>
            <button class="btn-icon" style="background:rgba(239, 68, 68, 0.1); color:var(--accent-red); width:40px; height:40px" onclick="deletePlan('${plan.id}')" title="Delete">🗑</button>
          </div>
        `;
        list.appendChild(card);
      });
    }

    function openScheduleModal(planId) {
       activePlanIdForSchedule = planId;
       const plan = Storage.get().plans.find(p => p.id === planId);
       document.getElementById('qs-plan-title').innerText = plan.title;
       document.getElementById('quick-schedule-modal').classList.add('active');
    }

    function closeModals() {
       document.getElementById('quick-schedule-modal').classList.remove('active');
    }

    function applyQuickSchedule() {
       const dateStr = document.getElementById('qs-date').value;
       const pattern = document.getElementById('qs-pattern').value;
       const weeks = parseInt(document.getElementById('qs-repeat').value);
       
       if(!dateStr) return;

       const data = Storage.get();
       const plan = data.plans.find(p => p.id === activePlanIdForSchedule);
       
       let currentDate = new Date(dateStr);
       const offset = currentDate.getTimezoneOffset();
       currentDate.setTime(currentDate.getTime() + (offset*60*1000));
       
       for(let w=0; w<weeks; w++) {
          let weekStartDate = new Date(currentDate);
          weekStartDate.setDate(weekStartDate.getDate() + (w * 7));
          
          plan.sessions.forEach((sess, sIdx) => {
             let sessionDate = new Date(weekStartDate);
             if(pattern === 'alternate') {
                sessionDate.setDate(sessionDate.getDate() + (sIdx * 2));
             } else {
                sessionDate.setDate(sessionDate.getDate() + sIdx);
             }
             
             // fix offset for iso string
             let saveDate = new Date(sessionDate.getTime() - (sessionDate.getTimezoneOffset() * 60000));
             let iso = saveDate.toISOString().split('T')[0];
             
             if(!data.schedule[iso] || data.schedule[iso].status !== 'completed') {
                data.schedule[iso] = {
                   planId: plan.id,
                   sessionIndex: sIdx,
                   status: 'upcoming'
                };
             }
          });
       }
       
       Storage.save();
       closeModals();
       UI.toast(`Scheduled for ${weeks} week(s)!`);
       setTimeout(() => {
          window.location = 'calendar.html';
       }, 1000);
    }

    function createPlan() {
      const data = Storage.get();
      const newId = 'p' + Date.now();
      data.plans.unshift({
        id: newId,
        title: "New Custom Plan",
        goal: "Strength",
        sessionsPerWeek: 3,
        difficulty: "Beginner",
        tags: ["Custom"],
        sessions: [
           { name: "Day 1", exercises: [] }
        ]
      });
      Storage.save();
      window.location = `builder.html?id=${newId}`;
    }

    function deletePlan(planId) {
      if(confirm("Are you sure you want to delete this plan?")) {
        const data = Storage.get();
        data.plans = data.plans.filter(p => p.id !== planId);
        Storage.save();
        renderPlans();
        UI.toast("Plan deleted");
      }
    }
  </script>
</body>
</html>
